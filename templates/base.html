<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catering Schedule{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='leaflet.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <script src="{{ url_for('static', filename='leaflet.js') }}"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-brand">
            <a href="/" >
                <img src="https://d3ciwvs59ifrt8.cloudfront.net/9cf1ec9b-d1e5-446e-bba8-79268b0d6b88/a2c61101-ffed-487e-9e8e-1248ae3a4cb7.png"
                 alt="Anita's" class="header-logo">
            </a>
            <span class="header-divider">|</span>
            <span class="header-label">CATERING OPS</span>
            <span class="header-divider">|</span>
            <span class="header-sub">SCHEDULE MANAGER</span>
        </div>
        <nav class="header-nav">
            {% block nav %}
            <a href="{{ url_for('home') }}" class="nav-link">HOME</a>
            <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">SCHEDULE</a>
            <a href="{{ url_for('store') }}" class="nav-link {% if request.endpoint == 'store' %}active{% endif %}">STORE VIEW</a>
            <a href="/.auth/logout" class="nav-link nav-link--logout">LOGOUT</a>
            {% endblock %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
